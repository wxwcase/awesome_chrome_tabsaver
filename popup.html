<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Tab Saver</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <style>
      :root {
        --bg: #fafbfc;
        --panel: #ffffff;
        --border: #dadce0;
        --text: #202124;
        --muted: #5f6368;
        --accent: #3367d6;
        --accent-soft: #e8f0fe;
        --row-hover: #f1f3f4;
        --danger: #d93025;
        --danger-soft: #fce8e6;
        --success: #1f8a3b;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        width: 420px;
        max-height: 600px;
        font: 13px/1.45 -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex; flex-direction: column;
      }
      header {
        padding: 10px 12px 8px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        display: flex; flex-direction: column; gap: 8px;
      }
      .save-row { display: flex; gap: 8px; align-items: center; }
      .save-btn {
        flex: 1;
        background: var(--accent); color: #fff;
        border: 0; border-radius: 6px; padding: 8px 12px;
        font: inherit; font-weight: 600; cursor: pointer;
      }
      .save-btn:hover { filter: brightness(0.95); }
      .save-btn.saved { background: var(--success); }
      .save-btn:disabled { opacity: 0.6; cursor: default; }
      .sub { color: var(--muted); font-size: 13px; margin: 0; text-align: right; }
      .search-row { display: flex; gap: 8px; align-items: stretch; }
      .show-all-btn {
        flex: 0 0 auto;
        background: var(--accent-soft); color: var(--accent);
        border: 1px solid var(--border); border-radius: 6px;
        padding: 0 12px; font: inherit; font-weight: 600; cursor: pointer;
        white-space: nowrap;
      }
      .show-all-btn:hover { filter: brightness(0.97); }
      .search-box {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 10px;
        display: flex; gap: 8px; align-items: center;
      }
      .search-box svg { flex: 0 0 auto; color: var(--muted); }
      .search-box input {
        flex: 1; border: 0; outline: none; font: inherit; background: transparent; color: inherit;
      }
      .results {
        flex: 1; min-height: 0;
        overflow-y: auto;
        padding: 8px 12px 12px;
        display: flex; flex-direction: column; gap: 8px;
      }
      .results:empty { display: none; }
      .group {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .group-header {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        padding: 6px 10px;
        background: #f8f9fa;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
      }
      .group-header .when { font-weight: 600; }
      .group-header .meta { color: var(--muted); }
      .group-header button {
        background: var(--accent-soft); color: var(--accent);
        border: 0; border-radius: 4px; padding: 3px 8px;
        font: inherit; font-size: 11px; cursor: pointer;
      }
      .row {
        display: grid; grid-template-columns: 1fr auto; gap: 8px;
        padding: 8px 10px;
        border-top: 1px solid #eef0f3;
        align-items: center;
        cursor: pointer;
      }
      .group-header + .row { border-top: 0; }
      .row:hover { background: var(--row-hover); }
      .row > div:first-child { min-width: 0; }
      .title { font-weight: 500; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .url { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .actions { display: flex; gap: 4px; }
      .actions button {
        background: transparent; color: var(--accent);
        border: 1px solid var(--accent); border-radius: 4px;
        padding: 3px 8px; font: inherit; font-size: 11px; cursor: pointer;
        white-space: nowrap;
      }
      .actions button:hover { background: var(--accent-soft); }
      .actions button.danger { color: var(--danger); border-color: var(--danger); }
      .actions button.danger:hover { background: var(--danger-soft); }
      .actions button.close {
        border: 0; border-radius: 4px;
        width: 24px; height: 24px; padding: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; font-weight: 700; line-height: 1; color: var(--danger);
        background: transparent;
      }
      .actions button.close:hover { background: var(--danger-soft); }
      mark { background: #fff3a3; color: inherit; padding: 0 1px; border-radius: 2px; }
      .empty, .hint {
        color: var(--muted); padding: 16px 12px; text-align: center; font-size: 12px;
        background: var(--panel); border: 1px dashed var(--border); border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="save-row">
        <button id="save" class="save-btn" type="button">Save all tabs</button>
      </div>
      <div class="search-row">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="q" type="search" placeholder="Search active tabs (title or URL)" autofocus autocomplete="off" spellcheck="false"/>
        </div>
        <button id="show-all" class="show-all-btn" type="button">Show all tabs</button>
      </div>
      <p class="sub" id="sub"></p>
    </header>
    <div id="results" class="results"></div>
    <script type="module" src="dist/popup.js"></script>
  </body>
</html>
